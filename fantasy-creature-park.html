<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻农场</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        .game-container { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 10px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.08); border-radius: 15px; padding: 12px 20px;
            margin-bottom: 10px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap; gap: 8px;
        }
        .player-info { display: flex; align-items: center; gap: 10px; }
        .player-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(224,170,255,0.2); border: 2px solid rgba(224,170,255,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; transition: all 0.2s;
        }
        .player-avatar:hover { transform: scale(1.1); }
        .player-level { font-size: 12px; color: #e0aaff; }
        .season-badge {
            font-size: 20px; background: rgba(255,255,255,0.15); border-radius: 12px;
            padding: 5px 15px; font-weight: bold;
        }
        .coins, .exp-display {
            font-size: 16px; font-weight: bold;
        }
        .coins { color: #FFD700; }
        .exp-display { color: #81c784; }

        .main-area {
            background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px;
            min-height: 520px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }

        /* ========== 角色选择界面 ========== */
        .character-select {
            text-align: center; padding: 40px 20px;
        }
        .character-select h2 { font-size: 28px; color: #e0aaff; margin-bottom: 10px; }
        .character-select .subtitle { color: #aaa; margin-bottom: 30px; }
        .gender-select {
            display: flex; justify-content: center; gap: 30px; margin-bottom: 30px;
        }
        .gender-option {
            background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px; padding: 25px 40px; cursor: pointer; transition: all 0.3s;
            text-align: center;
        }
        .gender-option:hover, .gender-option.selected {
            border-color: #e0aaff; background: rgba(224,170,255,0.12);
            transform: translateY(-5px);
        }
        .gender-option .big-emoji { font-size: 60px; display: block; margin-bottom: 10px; }
        .gender-option .label { font-size: 16px; font-weight: bold; }

        .outfit-preview {
            margin: 20px auto; padding: 20px;
            background: rgba(255,255,255,0.05); border-radius: 15px;
            max-width: 300px;
        }
        .outfit-preview .preview-avatar { font-size: 80px; display: block; margin-bottom: 10px; }
        .outfit-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px;
        }
        .outfit-item {
            aspect-ratio: 1; background: rgba(255,255,255,0.08);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; border: 2px solid transparent;
            transition: all 0.2s; position: relative;
        }
        .outfit-item:hover { border-color: rgba(224,170,255,0.4); }
        .outfit-item.locked { opacity: 0.3; cursor: not-allowed; }
        .outfit-item.equipped { border-color: #e0aaff; background: rgba(224,170,255,0.15); }
        .outfit-item .lock-icon {
            position: absolute; bottom: 2px; right: 2px; font-size: 10px;
        }

        /* ========== 农场地图 ========== */
        .farm-map {
            position: relative; width: 100%; height: 480px;
            background:
                radial-gradient(ellipse 60% 40% at 75% 70%, rgba(100,149,237,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 30% 25% at 20% 25%, rgba(34,139,34,0.2) 0%, transparent 70%),
                linear-gradient(135deg, #1e3a1e 0%, #2d5a3a 30%, #1a3a2e 60%, #1e2a1e 100%);
            border-radius: 20px; overflow: hidden; border: 3px solid rgba(139,115,85,0.5);
        }

        /* 地图装饰 */
        .map-decoration {
            position: absolute; pointer-events: none; user-select: none;
        }
        .tree-1 { font-size: 50px; }
        .tree-2 { font-size: 40px; }
        .tree-3 { font-size: 55px; }
        .pond {
            position: absolute; border-radius: 50%;
            background: radial-gradient(ellipse at 35% 35%, rgba(135,206,235,0.5), rgba(70,130,180,0.4));
            border: 2px solid rgba(135,206,235,0.3);
        }
        .pond::after {
            content: '〰️'; position: absolute; top: 30%; left: 20%;
            font-size: 14px; opacity: 0.5; animation: wave 2s infinite alternate;
        }
        .pond::before {
            content: '〰️'; position: absolute; bottom: 30%; right: 25%;
            font-size: 12px; opacity: 0.4; animation: wave 2.5s infinite alternate-reverse;
        }
        @keyframes wave { 0% { transform: translateX(-3px); } 100% { transform: translateX(3px); } }

        .fence-h {
            position: absolute; height: 8px;
            background: repeating-linear-gradient(90deg, #8b7355 0px, #8b7355 6px, #a08060 6px, #a08060 12px);
            border-radius: 3px;
        }
        .fence-v {
            position: absolute; width: 8px;
            background: repeating-linear-gradient(0deg, #8b7355 0px, #8b7355 6px, #a08060 6px, #a08060 12px);
            border-radius: 3px;
        }
        .fence-post {
            position: absolute; width: 12px; height: 12px;
            background: #6b5344; border-radius: 2px;
        }

        .path-dot {
            position: absolute; width: 6px; height: 6px;
            background: rgba(194,178,128,0.4); border-radius: 50%;
        }

        .zone-label {
            position: absolute; font-size: 12px; font-weight: bold;
            color: rgba(255,255,255,0.6); background: rgba(0,0,0,0.3);
            padding: 3px 10px; border-radius: 10px; pointer-events: none;
            letter-spacing: 1px;
        }

        /* 养殖区 */
        .farm-zone {
            position: absolute; border-radius: 15px;
            border: 2px dashed rgba(139,115,85,0.5);
            background: rgba(34,100,34,0.15);
        }

        /* 动物 */
        .animal {
            position: absolute; font-size: 36px; cursor: pointer;
            transition: transform 0.3s ease-out; user-select: none;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .animal:hover { transform: scale(1.2); filter: drop-shadow(0 0 8px rgba(224,170,255,0.5)); }
        .animal.moving { transition: transform 0.3s ease-out, left 2s linear, top 2s linear; }
        .animal-name-tag {
            position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
            font-size: 10px; white-space: nowrap; background: rgba(0,0,0,0.6);
            padding: 1px 6px; border-radius: 6px; color: #fff; pointer-events: none;
        }
        .animal-hunger {
            position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 4px; background: rgba(0,0,0,0.5); border-radius: 2px; overflow: hidden;
        }
        .animal-hunger-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

        /* 种植地 */
        .farm-plot {
            position: absolute; width: 56px; height: 56px;
            background: linear-gradient(145deg, #5d4037, #4e342e);
            border-radius: 8px; border: 2px solid #3e2723;
            cursor: pointer; transition: all 0.2s; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2);
        }
        .farm-plot:hover { transform: scale(1.08); border-color: #e0aaff; }
        .farm-plot.empty::after {
            content: '➕'; font-size: 16px; color: rgba(255,255,255,0.3);
        }
        .farm-plot .crop-emoji { font-size: 32px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
        .farm-plot .plot-level {
            position: absolute; top: 2px; right: 2px; font-size: 9px;
            background: rgba(0,0,0,0.5); color: #ffd700; padding: 0 4px; border-radius: 4px;
        }
        .farm-plot .crop-progress {
            position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
            background: rgba(0,0,0,0.4);
        }
        .farm-plot .crop-progress-fill {
            height: 100%; background: #81c784; transition: width 0.5s;
        }
        .farm-plot.ready {
            animation: plotReady 1s ease-in-out infinite alternate;
        }
        @keyframes plotReady {
            0% { box-shadow: 0 0 0px rgba(129,199,132,0); }
            100% { box-shadow: 0 0 12px rgba(129,199,132,0.5); border-color: #81c784; }
        }

        /* 玩家角色 */
        .player-char {
            position: absolute; font-size: 40px; cursor: pointer;
            transition: left 0.5s linear, top 0.5s linear;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            z-index: 20;
        }
        .player-char:hover { transform: scale(1.1); }
        .player-name-tag {
            position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
            font-size: 10px; white-space: nowrap; background: rgba(224,170,255,0.3);
            padding: 1px 8px; border-radius: 8px; color: #e0aaff; font-weight: bold;
            border: 1px solid rgba(224,170,255,0.3);
        }

        /* ========== 操作面板 ========== */
        .side-panel {
            position: fixed; right: -340px; top: 50%; transform: translateY(-50%);
            width: 320px; max-height: 85vh; overflow-y: auto;
            background: #2a2a4a; border-radius: 20px 0 0 20px;
            border: 2px solid rgba(224,170,255,0.3); border-right: none;
            padding: 20px; z-index: 200;
            transition: right 0.3s ease-out;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
        }
        .side-panel.open { right: 0; }
        .side-panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .side-panel-title { font-size: 18px; font-weight: bold; color: #e0aaff; }
        .panel-close-btn {
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            font-size: 16px; transition: all 0.2s;
        }
        .panel-close-btn:hover { background: rgba(244,67,54,0.5); }

        .stat-bar { margin: 10px 0; }
        .stat-bar label {
            display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px;
        }
        .stat-bar .bar {
            height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden;
        }
        .stat-bar .bar-fill {
            height: 100%; border-radius: 5px; transition: width 0.5s;
        }
        .bar-hunger { background: #ff8a65; }
        .bar-happy { background: #81c784; }
        .bar-growth { background: #64b5f6; }

        .action-buttons {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px;
        }
        .action-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; padding: 10px; color: white; cursor: pointer;
            font-size: 13px; transition: all 0.2s; font-family: inherit;
        }
        .action-btn:hover { background: rgba(224,170,255,0.2); transform: translateY(-2px); }
        .action-btn:active { transform: translateY(0); }
        .action-btn .btn-emoji { font-size: 20px; display: block; margin-bottom: 3px; }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* 种植面板 */
        .crop-shop {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;
        }
        .crop-item {
            background: rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 5px;
            text-align: center; cursor: pointer; border: 2px solid transparent;
            transition: all 0.2s;
        }
        .crop-item:hover { border-color: rgba(224,170,255,0.4); background: rgba(224,170,255,0.1); }
        .crop-item .crop-icon { font-size: 28px; display: block; }
        .crop-item .crop-name { font-size: 11px; margin-top: 3px; }
        .crop-item .crop-price { font-size: 11px; color: #ffd700; }
        .crop-item .crop-time { font-size: 10px; color: #aaa; }

        .upgrade-section {
            margin-top: 15px; padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .upgrade-btn {
            width: 100%; background: linear-gradient(135deg, #7c3aed, #5b21b6);
            border: none; color: white; padding: 12px; border-radius: 12px;
            cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s;
            font-family: inherit;
        }
        .upgrade-btn:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); transform: scale(1.02); }
        .upgrade-btn:disabled { background: #555; cursor: not-allowed; transform: none; }

        /* ========== 底部导航 ========== */
        .bottom-nav {
            display: flex; justify-content: space-around; padding: 12px;
            background: rgba(255,255,255,0.08); border-radius: 15px;
            margin-top: 10px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn {
            background: none; border: none; color: #888; cursor: pointer;
            font-size: 13px; padding: 8px 15px; border-radius: 12px;
            transition: all 0.2s; font-family: inherit;
        }
        .nav-btn.active {
            color: #e0aaff; background: rgba(224,170,255,0.15);
        }
        .nav-btn .nav-emoji { font-size: 22px; display: block; margin-bottom: 2px; }

        .hidden { display: none !important; }

        .btn {
            background: #7c3aed; color: white; border: none;
            padding: 10px 25px; border-radius: 20px; cursor: pointer;
            font-size: 14px; font-family: inherit; font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover { background: #8b5cf6; }

        /* 粒子效果 */
        .particle {
            position: fixed; font-size: 20px; pointer-events: none;
            animation: particleFly 1s ease-out forwards; z-index: 300;
        }
        @keyframes particleFly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(0.5); opacity: 0; }
        }

        .notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(46,125,50,0.9); color: white;
            padding: 10px 25px; border-radius: 20px; font-size: 14px;
            z-index: 300; animation: notifSlide 0.3s ease-out;
            backdrop-filter: blur(10px);
        }
        @keyframes notifSlide {
            0% { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            100% { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* 图鉴 */
        .encyclopedia-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px; padding: 10px;
        }
        .ency-entry {
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px 8px;
            text-align: center; border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .ency-entry.unlocked {
            background: rgba(255,255,255,0.1);
            border-color: rgba(224,170,255,0.3);
        }
        .ency-entry .ency-emoji {
            font-size: 36px; filter: grayscale(100%); opacity: 0.3;
            transition: all 0.3s;
        }
        .ency-entry.unlocked .ency-emoji {
            filter: grayscale(0%); opacity: 1;
        }
        .ency-entry .ency-name { font-size: 12px; margin-top: 5px; }

        /* 探索 */
        .explore-zones {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }
        .zone-card {
            background: rgba(255,255,255,0.08); border-radius: 15px; padding: 20px;
            text-align: center; cursor: pointer; transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .zone-card:hover {
            transform: scale(1.03);
            border-color: rgba(224,170,255,0.5);
            background: rgba(255,255,255,0.12);
        }
        .zone-card .zone-emoji { font-size: 40px; margin-bottom: 8px; }
        .zone-card .zone-name { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .zone-card .zone-desc { font-size: 12px; color: #aaa; }

        .explore-animation { text-align: center; padding: 60px 20px; }
        .explore-animation .search-emoji {
            font-size: 60px; animation: searchPulse 1s ease-in-out infinite;
        }
        @keyframes searchPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .found-creature {
            text-align: center; padding: 40px;
            animation: foundPop 0.5s ease-out;
        }
        @keyframes foundPop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .found-creature .found-emoji { font-size: 80px; margin-bottom: 15px; }
        .found-creature .found-name { font-size: 24px; font-weight: bold; color: #e0aaff; margin-bottom: 5px; }
        .rarity-common { color: #aaa; }
        .rarity-rare { color: #4fc3f7; }
        .rarity-legendary { color: #ffd700; }

        @media (max-width: 600px) {
            .side-panel { width: 280px; right: -300px; }
            .farm-map { height: 400px; }
            .animal { font-size: 28px; }
            .explore-zones { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="game-container">
        <div class="top-bar" id="topBar" style="display:none;">
            <div class="player-info">
                <div class="player-avatar" id="playerAvatarBtn" onclick="openCharacterPanel()" title="点击查看角色"></div>
                <div>
                    <div id="playerNameDisplay" style="font-size:14px; font-weight:bold;">农夫</div>
                    <div class="player-level">Lv.<span id="playerLevel">1</span></div>
                </div>
            </div>
            <div style="display:flex; gap:15px; align-items:center;">
                <div class="season-badge" id="seasonDisplay">🌸 春季</div>
                <div class="exp-display">⭐ <span id="expDisplay">0</span></div>
                <div class="coins">💰 <span id="coinsDisplay">100</span></div>
            </div>
        </div>

        <div class="main-area" id="mainArea">
            <!-- 动态内容 -->
        </div>

        <div class="bottom-nav" id="bottomNav" style="display:none;">
            <button class="nav-btn active" data-page="farm" onclick="switchPage('farm')">
                <span class="nav-emoji">🌾</span>农场
            </button>
            <button class="nav-btn" data-page="explore" onclick="switchPage('explore')">
                <span class="nav-emoji">🗺️</span>探索
            </button>
            <button class="nav-btn" data-page="encyclopedia" onclick="switchPage('encyclopedia')">
                <span class="nav-emoji">📖</span>图鉴
            </button>
        </div>
    </div>

    <!-- 侧边操作面板 -->
    <div class="side-panel" id="sidePanel">
        <div class="side-panel-header">
            <div class="side-panel-title" id="panelTitle">详情</div>
            <button class="panel-close-btn" onclick="closeSidePanel()">✕</button>
        </div>
        <div id="panelContent"></div>
    </div>

    <!-- 角色面板 -->
    <div class="side-panel" id="charPanel">
        <div class="side-panel-header">
            <div class="side-panel-title">我的角色</div>
            <button class="panel-close-btn" onclick="closeCharPanel()">✕</button>
        </div>
        <div id="charPanelContent"></div>
    </div>

    <script>
        // ============ 游戏数据 ============
        const CREATURE_TYPES = {
            firefly: { name: '星萤', emoji: '🦋', desc: '会发光的夜行生物', rarity: 'common' },
            singing_flower: { name: '歌花', emoji: '🌺', desc: '会唱歌的神奇花朵', rarity: 'common' },
            moon_rabbit: { name: '月兔', emoji: '🐰', desc: '居住在月光下的兔子', rarity: 'common' },
            crystal_deer: { name: '晶鹿', emoji: '🦌', desc: '鹿角由水晶构成的鹿', rarity: 'rare' },
            bubble_fish: { name: '泡泡鱼', emoji: '🐠', desc: '吐出彩色泡泡的鱼', rarity: 'common' },
            pearl_turtle: { name: '珍珠龟', emoji: '🐢', desc: '背壳镶嵌珍珠的乌龟', rarity: 'rare' },
            flame_fox: { name: '焰狐', emoji: '🦊', desc: '尾巴燃烧着火焰的狐狸', rarity: 'rare' },
            snow_owl: { name: '雪鸮', emoji: '🦉', desc: '只在雪夜出现的猫头鹰', rarity: 'rare' },
            star_dragon: { name: '星龙', emoji: '🐉', desc: '传说级生物，极难遇见', rarity: 'legendary' },
            cloud_sheep: { name: '云羊', emoji: '🐑', desc: '毛茸茸像云朵的羊', rarity: 'common' },
            thunder_wolf: { name: '雷狼', emoji: '🐺', desc: '奔跑时带闪电的狼', rarity: 'rare' },
            golden_bird: { name: '金羽雀', emoji: '🐦', desc: '羽毛闪耀金光的鸟', rarity: 'legendary' },
        };

        const CROPS = {

            fairy_female: { emoji: '🧚‍♀️', name: '仙子装', unlockLevel: 15, gender: 'female' },
        };

        // ============ 游戏状态 ============
        let gameState = loadGame();
        let currentPage = 'farm';
        let selectedAnimalId = null;
        let selectedPlotIdx = null;
        let animalMovementInterval = null;
        let playerMovementInterval = null;

        function getInitialState() {
            const now = new Date();
            const month = now.getMonth() + 1;
            let season = 'spring';
            if (month >= 6 && month <= 8) season = 'summer';
            else if (month >= 9 && month <= 11) season = 'autumn';
            else if (month === 12 || month <= 2) season = 'winter';

            return {
                coins: 100,
                exp: 0,
                playerLevel: 1,
                season: season,
                playerName: '农夫',
                playerGender: null,
                playerOutfit: null,
                creatures: [],
                plots: [],
                discovered: [],
                nextCreatureId: 1,
                firstTime: true,
            };
        }

        function loadGame() {
            try {
                const saved = localStorage.getItem('fantasyCreaturePark_v2');
                if (saved) return JSON.parse(saved);
            } catch (e) {}
            return getInitialState();
        }

        function saveGame() {
            localStorage.setItem('fantasyCreaturePark_v2', JSON.stringify(gameState));
        }

        // ============ 工具函数 ============
        function showNotification(text) {
            const el = document.createElement('div');
            el.className = 'notification';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        function createParticles(x, y, emojis) {
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = (x + Math.random() * 60 - 30) + 'px';
                p.style.top = (y + Math.random() * 30) + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        function getRarityLabel(rarity) {
            return { common: '普通', rare: '稀有', legendary: '传说' }[rarity] || rarity;
        }

        function addExp(amount) {
            gameState.exp += amount;
            const needed = gameState.playerLevel * 50;
            if (gameState.exp >= needed) {
                gameState.exp -= needed;
                gameState.playerLevel++;
                showNotification(`🎉 升级到 Lv.${gameState.playerLevel}！解锁新服装！`);
                createParticles(window.innerWidth / 2, window.innerHeight / 2, ['🎉', '🎊', '✨', '⭐']);
                if (document.getElementById('charPanel').classList.contains('open')) {
                    renderCharacterPanel();
                }
            }
            updateDisplay();
            saveGame();
        }

        // ============ 角色选择 ============
        function renderCharacterSelect() {
            const area = document.getElementById('mainArea');
            area.innerHTML = `
                <div class="character-select">
                    <h2>🌾 欢迎来到梦幻农场</h2>
                    <div class="subtitle">选择你的角色开始冒险吧！</div>
                    <div class="gender-select">
                        <div class="gender-option" id="genderMale" onclick="selectGender('male')">
                            <span class="big-emoji">👦</span>
                            <span class="label">男生</span>
                        </div>
                        <div class="gender-option" id="genderFemale" onclick="selectGender('female')">
                            <span class="big-emoji">👧</span>
                            <span class="label">女生</span>
                        </div>
                    </div>
                    <div id="nameInputArea" style="display:none; margin-bottom:20px;">
                        <div style="margin-bottom:10px; color:#aaa;">给你的角色起个名字：</div>
                        <input type="text" id="playerNameInput" maxlength="8" value="小农夫"
                            style="padding:10px 20px; border-radius:12px; border:2px solid rgba(224,170,255,0.3);
                            background:rgba(255,255,255,0.1); color:#fff; font-size:16px; text-align:center;
                            outline:none; width:200px;">
                    </div>
                    <button class="btn" id="startBtn" style="display:none;" onclick="startGame()">开始游戏</button>
                </div>
            `;
        }

        function selectGender(gender) {
            gameState.playerGender = gender;
            document.querySelectorAll('.gender-option').forEach(el => el.classList.remove('selected'));
            document.getElementById(gender === 'male' ? 'genderMale' : 'genderFemale').classList.add('selected');
            document.getElementById('nameInputArea').style.display = 'block';
            document.getElementById('startBtn').style.display = 'inline-block';
        }

        function startGame() {
            const name = document.getElementById('playerNameInput').value.trim();
            if (name) gameState.playerName = name;
            gameState.firstTime = false;
            gameState.playerOutfit = gameState.playerGender === 'male' ? 'default_male' : 'default_female';

            // 初始化土地
            for (let i = 0; i < 6; i++) {
                gameState.plots.push({ level: 1, crop: null, plantTime: null, harvestReady: false });
            }

            // 送一只初始动物
            const starterTypes = ['moon_rabbit', 'cloud_sheep', 'bubble_fish'];
            const starterId = starterTypes[Math.floor(Math.random() * starterTypes.length)];
            const starterType = CREATURE_TYPES[starterId];
            gameState.creatures.push({
                id: gameState.nextCreatureId++,
                typeId: starterId,
                name: starterType.name,
                hunger: 80,
                happy: 70,
                growth: 0,
                level: 1,
            });
            gameState.discovered.push(starterId);

            saveGame();
            document.getElementById('topBar').style.display = 'flex';
            document.getElementById('bottomNav').style.display = 'flex';
            updateDisplay();
            switchPage('farm');
            showNotification(`🎁 送你一只 ${starterType.name} 作为初始伙伴！`);
        }

        // ============ 页面切换 ============
        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === page);
            });
            closeSidePanel();
            renderPage();
        }

        function renderPage() {
            const area = document.getElementById('mainArea');
            area.innerHTML = '';

            switch (currentPage) {
                case 'farm': renderFarm(area); break;
                case 'explore': renderExplore(area); break;
                case 'encyclopedia': renderEncyclopedia(area); break;
            }
        }

        // ============ 农场地图 ============
        function renderFarm(area) {
            // 地图容器
            const map = document.createElement('div');

            map.appendChild(pond);

            // 装饰：树木
            const trees = [
                { emoji: '🌳', cls: 'tree-1', x: 5, y: 5 },
                { emoji: '🌲', cls: 'tree-2', x: 15, y: 2 },
                { emoji: '🌳', cls: 'tree-3', x: 2, y: 25 },
                { emoji: '🌴', cls: 'tree-1', x: 85, y: 8 },
                { emoji: '🌲', cls: 'tree-2', x: 92, y: 20 },
                { emoji: '🌳', cls: 'tree-1', x: 88, y: 75 },
                { emoji: '🌲', cls: 'tree-2', x: 3, y: 70 },
                { emoji: '🌻', cls: 'tree-2', x: 50, y: 3 },

            map.appendChild(label2);

            // 养殖区围栏
            const ranchZone = document.createElement('div');

            fences.forEach(f => {
                const el = document.createElement('div');
                el.className = f.type === 'h' ? 'fence-h' : 'fence-v';

                el.style.top = f.y + '%';

            const posts = [
                [5,25], [25,25], [44,25],
                [5,78], [25,78], [44,78],

                const p = document.createElement('div');
                p.className = 'fence-post';
                p.style.left = x + '%';
                p.style.top = y + '%';

            // 种植区
            const farmZone = document.createElement('div');

            farmZone.style.cssText = 'left:55%; top:25%; width:38%; height:55%; background:rgba(101,67,33,0.15);';

                    const crop = CROPS[plot.crop];
                    inner += `<div class="crop-emoji">${crop.emoji}</div>`;
                    if (!plot.harvestReady) {
                        const elapsed = (Date.now() - plot.plantTime) / 1000;
                        const timeNeeded = crop.growTime / plot.level;
                        const progress = Math.min(1, elapsed / timeNeeded);
                        inner += `<div class="crop-progress"><div class="crop-progress-fill" style="width:${progress * 100}%"></div></div>`;

                        inner += `<div style="position:absolute; top:2px; left:2px; font-size:10px;">✨</div>`;

                }

                    ${outfit.emoji}
                    <div class="player-name-tag">${gameState.playerName}</div>

            area.appendChild(map);

            // 启动动物移动
            startAnimalMovement();
            startPlayerMovement();
        }

        // 动物移动逻辑
        function startAnimalMovement() {
            if (animalMovementInterval) clearInterval(animalMovementInterval);
            animalMovementInterval = setInterval(() => {
                gameState.creatures.forEach(creature => {
                    const el = document.getElementById(`animal-${creature.id}`);
                    if (!el) return;

                    // 在养殖区内随机移动
                    const newX = 8 + Math.random() * 32;
                    const newY = 30 + Math.random() * 45;
                    el.style.transition = 'left 2s linear, top 2s linear';
                    el.style.left = newX + '%';
                    el.style.top = newY + '%';

                    // 面向方向
                    const currentLeft = parseFloat(el.style.left) || 0;
                    if (newX > currentLeft) {
                        el.style.transform = 'scaleX(-1)';
                    } else {
                        el.style.transform = 'scaleX(1)';
                    }
                });
            }, 2500 + Math.random() * 1000);
        }

        // 玩家角色移动
        function startPlayerMovement() {
            if (playerMovementInterval) clearInterval(playerMovementInterval);
            playerMovementInterval = setInterval(() => {
                const player = document.getElementById('playerChar');
                if (!player) return;
                const targets = [
                    [48, 70], [20, 60], [75, 45], [60, 70], [35, 50], [80, 65]
                ];
                const target = targets[Math.floor(Math.random() * targets.length)];
                player.style.transition = 'left 3s linear, top 3s linear';
                player.style.left = target[0] + '%';
                player.style.top = target[1] + '%';
            }, 4000 + Math.random() * 2000);
        }

        // ============ 动物交互面板 ============
        function onAnimalClick(creatureId) {
            selectedAnimalId = creatureId;
            selectedPlotIdx = null;
            const creature = gameState.creatures.find(c => c.id === creatureId);
            if (!creature) return;
            const type = CREATURE_TYPES[creature.typeId];

            document.getElementById('panelTitle').textContent = creature.name || type.name;

            let moodClass = 'mood-neutral';
            let moodText = '一般';
            if (creature.happy >= 70 && creature.hunger >= 50) {
                moodClass = 'mood-happy'; moodText = '开心';
            } else if (creature.happy < 30 || creature.hunger < 20) {
                moodClass = 'mood-sad'; moodText = '难过';
            }

            const hungerColor = creature.hunger > 50 ? '#81c784' : creature.hunger > 20 ? '#ffd54f' : '#ef5350';

            document.getElementById('panelContent').innerHTML = `
                <div style="text-align:center; margin-bottom:15px;">
                    <div style="font-size:60px;">${type.emoji}</div>
                    <div style="font-size:13px; color:#aaa;">${type.desc}</div>
                    <div style="margin-top:5px;"><span style="background:rgba(224,170,255,0.2); padding:2px 10px; border-radius:10px; font-size:12px;">Lv.${creature.level}</span></div>
                </div>
                <div class="stat-bar">
                    <label><span>饱食度</span><span>${Math.round(creature.hunger)}%</span></label>
                    <div class="bar"><div class="bar-fill" style="width:${creature.hunger}%; background:${hungerColor};"></div></div>
                </div>
                <div class="stat-bar">
                    <label><span>幸福度</span><span>${Math.round(creature.happy)}%</span></label>
                    <div class="bar"><div class="bar-fill bar-happy" style="width:${creature.happy}%"></div></div>
                </div>
                <div class="stat-bar">
                    <label><span>成长值</span><span>${Math.round(creature.growth)}%</span></label>
                    <div class="bar"><div class="bar-fill bar-growth" style="width:${creature.growth}%"></div></div>
                </div>
                <div style="text-align:center; margin-top:10px; font-size:13px; color:${moodClass === 'mood-happy' ? '#81c784' : moodClass === 'mood-sad' ? '#ef5350' : '#ffd54f'};">
                    心情：${moodText}
                </div>
                <div class="action-buttons" style="margin-top:15px;">
                    <button class="action-btn" onclick="interactCreature(${creature.id}, 'feed')">
                        <span class="btn-emoji">🍎</span>喂食
                    </button>
                    <button class="action-btn" onclick="interactCreature(${creature.id}, 'play')">
                        <span class="btn-emoji">🎾</span>玩耍
                    </button>
                    <button class="action-btn" onclick="interactCreature(${creature.id}, 'clean')">
                        <span class="btn-emoji">🧹</span>清洁
                    </button>
                    <button class="action-btn" onclick="interactCreature(${creature.id}, 'pet')">
                        <span class="btn-emoji">💕</span>抚摸
                    </button>
                    <button class="action-btn" onclick="interactCreature(${creature.id}, 'train')">
                        <span class="btn-emoji">📚</span>训练
                    </button>
                    <button class="action-btn" onclick="releaseCreature(${creature.id})" style="color:#ef5350;">
                        <span class="btn-emoji">🚪</span>放生
                    </button>
                </div>
            `;

            document.getElementById('sidePanel').classList.add('open');
        }

        function interactCreature(creatureId, action) {
            const creature = gameState.creatures.find(c => c.id === creatureId);
            if (!creature) return;

            const panel = document.getElementById('sidePanel');
            const rect = panel.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + 80;

            switch (action) {
                case 'feed':
                    if (gameState.coins < 5) { showNotification('💰 金币不足！'); return; }
                    gameState.coins -= 5;
                    creature.hunger = Math.min(100, creature.hunger + 30);
                    creature.growth = Math.min(100, creature.growth + 5);
                    showNotification('🍎 喂食成功！饱食度 +30');
                    createParticles(centerX, centerY, ['🍎', '🍊', '🍇', '🥕']);
                    addExp(3);
                    break;
                case 'play':
                    creature.happy = Math.min(100, creature.happy + 25);
                    creature.hunger = Math.max(0, creature.hunger - 10);
                    creature.growth = Math.min(100, creature.growth + 3);
                    showNotification('🎾 玩得很开心！幸福度 +25');
                    createParticles(centerX, centerY, ['🎾', '🎮', '🎪', '🎨']);
                    addExp(2);
                    break;
                case 'clean':
                    creature.happy = Math.min(100, creature.happy + 10);
                    creature.growth = Math.min(100, creature.growth + 2);
                    showNotification('🧹 环境变干净了！幸福度 +10');
                    addExp(1);
                    break;
                case 'pet':
                    creature.happy = Math.min(100, creature.happy + 15);
                    showNotification('💕 它看起来很开心！幸福度 +15');
                    createParticles(centerX, centerY, ['💕', '💖', '💗', '💓']);
                    addExp(1);
                    break;
                case 'train':
                    if (gameState.coins < 10) { showNotification('💰 金币不足！'); return; }
                    gameState.coins -= 10;
                    creature.growth = Math.min(100, creature.growth + 20);
                    creature.hunger = Math.max(0, creature.hunger - 15);
                    showNotification('📚 训练成功！成长值 +20');
                    addExp(5);
                    break;
            }

            if (creature.growth >= 100) {
                creature.growth = 0;
                creature.level++;
                showNotification(`🎉 ${creature.name} 升到了 Lv.${creature.level}！`);
                createParticles(centerX, centerY, ['🎉', '🎊', '✨', '🌟']);
            }

            saveGame();
            updateDisplay();
            onAnimalClick(creatureId);
            // 更新农场显示
            updateFarmDisplay();
        }

        function releaseCreature(creatureId) {
            if (!confirm('确定要放生这只生物吗？')) return;
            gameState.creatures = gameState.creatures.filter(c => c.id !== creatureId);
            saveGame();
            closeSidePanel();
            renderPage();
            showNotification('🚪 已放生');
        }

        // ============ 种植地交互 ============
        function onPlotClick(idx) {
            selectedPlotIdx = idx;
            selectedAnimalId = null;
            const plot = gameState.plots[idx];

            document.getElementById('panelTitle').textContent = `土地 #${idx + 1}`;

            let content = `
                <div style="text-align:center; margin-bottom:15px;">
                    <div style="font-size:14px; color:#e0aaff; margin-bottom:5px;">土地等级：Lv.${plot.level}</div>
                    <div style="font-size:12px; color:#aaa;">生长速度 x${plot.level} | 收获加成 +${(plot.level - 1) * 20}%</div>
                </div>
            `;

            if (plot.crop) {
                const crop = CROPS[plot.crop];
                if (plot.harvestReady) {
                    content += `
                        <div style="text-align:center; padding:20px;">
                            <div style="font-size:60px; animation:foundPop 0.5s ease-out;">${crop.emoji}</div>
                            <div style="font-size:18px; font-weight:bold; color:#81c784; margin-top:10px;">${crop.name} 成熟了！</div>
                            <div style="font-size:14px; color:#ffd700; margin-top:5px;">可出售 💰${Math.floor(crop.sellPrice * (1 + (plot.level - 1) * 0.2))}</div>
                            <button class="btn" style="margin-top:15px; width:100%;" onclick="harvestCrop(${idx})">🌾 收获</button>
                        </div>
                    `;
                } else {
                    const elapsed = (Date.now() - plot.plantTime) / 1000;
                    const timeNeeded = crop.growTime / plot.level;
                    const remaining = Math.max(0, Math.ceil(timeNeeded - elapsed));
                    const progress = Math.min(1, elapsed / timeNeeded);
                    content += `
                        <div style="text-align:center; padding:15px;">
                            <div style="font-size:50px;">${crop.emoji}</div>
                            <div style="font-size:16px; margin-top:5px;">${crop.name} 生长中...</div>
                            <div style="margin-top:10px;">
                                <div class="bar"><div class="bar-fill bar-growth" style="width:${progress * 100}%"></div></div>
                            </div>
                            <div style="font-size:13px; color:#aaa; margin-top:5px;">剩余约 ${remaining} 秒</div>
                        </div>
                    `;
                }
            } else {
                content += `
                    <div style="font-size:13px; color:#aaa; margin-bottom:10px; text-align:center;">选择要种植的作物：</div>
                    <div class="crop-shop">
                        ${Object.entries(CROPS).map(([key, crop]) => {
                            const locked = gameState.playerLevel < crop.unlockLevel;
                            return `
                                <div class="crop-item ${locked ? 'locked' : ''}" ${locked ? '' : `onclick="plantCrop(${idx}, '${key}')"`} title="${locked ? `需要 Lv.${crop.unlockLevel}` : ''}">
                                    <span class="crop-icon">${crop.emoji}</span>
                                    <div class="crop-name">${crop.name}</div>
                                    <div class="crop-price">💰${crop.seedCost}</div>
                                    <div class="crop-time">⏱️${crop.growTime}s</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            // 升级按钮
            const upgradeCost = plot.level * 50;
            const canUpgrade = gameState.coins >= upgradeCost;
            content += `
                <div class="upgrade-section">
                    <div style="font-size:13px; color:#aaa; margin-bottom:8px; text-align:center;">
                        升级土地（花费 💰${upgradeCost}）
                    </div>
                    <button class="upgrade-btn" ${canUpgrade ? '' : 'disabled'} onclick="upgradePlot(${idx})">
                        ${canUpgrade ? '⬆️ 升级土地' : `💰 金币不足（需要${upgradeCost}）`}
                    </button>
                    <div style="font-size:11px; color:#888; text-align:center; margin-top:5px;">
                        升级后：生长速度提升、收获金币增加
                    </div>
                </div>
            `;

            document.getElementById('panelContent').innerHTML = content;
            document.getElementById('sidePanel').classList.add('open');
        }

        function plantCrop(idx, cropKey) {
            const crop = CROPS[cropKey];
            if (gameState.coins < crop.seedCost) {
                showNotification('💰 金币不足！');
                return;
            }
            gameState.coins -= crop.seedCost;
            gameState.plots[idx].crop = cropKey;
            gameState.plots[idx].plantTime = Date.now();
            gameState.plots[idx].harvestReady = false;
            saveGame();
            updateDisplay();
            showNotification(`🌱 种下 ${crop.name}！`);
            onPlotClick(idx);
            updateFarmDisplay();
        }

        function harvestCrop(idx) {
            const plot = gameState.plots[idx];
            const crop = CROPS[plot.crop];
            const bonus = 1 + (plot.level - 1) * 0.2;
            const earn = Math.floor(crop.sellPrice * bonus);
            gameState.coins += earn;
            gameState.plots[idx].crop = null;
            gameState.plots[idx].plantTime = null;
            gameState.plots[idx].harvestReady = false;
            saveGame();
            updateDisplay();
            showNotification(`🌾 收获 ${crop.name}！获得 💰${earn}`);
            addExp(4);
            closeSidePanel();
            updateFarmDisplay();

            const plotEl = document.getElementById(`plot-${idx}`);
            if (plotEl) {
                const rect = plotEl.getBoundingClientRect();
                createParticles(rect.left + rect.width / 2, rect.top, ['🌾', '💰', '✨', '⭐']);
            }
        }

        function upgradePlot(idx) {
            const plot = gameState.plots[idx];
            const cost = plot.level * 50;
            if (gameState.coins < cost) {
                showNotification('💰 金币不足！');
                return;
            }
            gameState.coins -= cost;
            gameState.plots[idx].level++;
            saveGame();
            updateDisplay();
            showNotification(`⬆️ 土地 #${idx + 1} 升级到 Lv.${plot.level}！`);
            addExp(8);
            onPlotClick(idx);
            updateFarmDisplay();
        }

        function updateFarmDisplay() {
            if (currentPage !== 'farm') return;
            gameState.plots.forEach((plot, idx) => {
                const el = document.getElementById(`plot-${idx}`);
                if (!el) return;
                el.className = 'farm-plot' + (plot.crop ? '' : ' empty') + (plot.harvestReady ? ' ready' : '');

                let inner = `<div class="plot-level">Lv.${plot.level}</div>`;
                if (plot.crop) {
                    const crop = CROPS[plot.crop];
                    inner += `<div class="crop-emoji">${crop.emoji}</div>`;
                    if (!plot.harvestReady) {
                        const elapsed = (Date.now() - plot.plantTime) / 1000;
                        const timeNeeded = crop.growTime / plot.level;
                        const progress = Math.min(1, elapsed / timeNeeded);
                        inner += `<div class="crop-progress"><div class="crop-progress-fill" style="width:${progress * 100}%"></div></div>`;
                    } else {
                        inner += `<div style="position:absolute; top:2px; left:2px; font-size:10px;">✨</div>`;
                    }
                }
                el.innerHTML = inner;
            });

            // 更新动物饥饿条
            gameState.creatures.forEach(creature => {
                const el = document.getElementById(`animal-${creature.id}`);
                if (!el) return;
                const hungerFill = el.querySelector('.animal-hunger-fill');
                if (hungerFill) {
                    const color = creature.hunger > 50 ? '#81c784' : creature.hunger > 20 ? '#ffd54f' : '#ef5350';
                    hungerFill.style.width = creature.hunger + '%';
                    hungerFill.style.background = color;
                }
            });
        }

        // ============ 检查作物成熟 ============
        function checkCropGrowth() {
            let changed = false;
            gameState.plots.forEach(plot => {
                if (plot.crop && !plot.harvestReady) {
                    const crop = CROPS[plot.crop];
                    const elapsed = (Date.now() - plot.plantTime) / 1000;
                    if (elapsed >= crop.growTime / plot.level) {
                        plot.harvestReady = true;
                        changed = true;
                    }
                }
            });
            if (changed) {
                saveGame();
                updateFarmDisplay();
            }
        }

        // ============ 探索 ============
        function renderExplore(area) {
            const title = document.createElement('div');
            title.style.cssText = 'text-align:center; font-size:22px; color:#e0aaff; margin-bottom:15px; font-weight:bold;';
            title.textContent = '🗺️ 探索世界';
            area.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'explore-zones';

            Object.entries(ZONES).forEach(([key, zone]) => {
                const card = document.createElement('div');
                card.className = 'zone-card';
                card.innerHTML = `
                    <div class="zone-emoji">${zone.emoji}</div>
                    <div class="zone-name">${zone.name}</div>
                    <div class="zone-desc">${zone.desc}</div>
                `;
                card.onclick = () => startExplore(key);
                grid.appendChild(card);
            });

            area.appendChild(grid);
        }

        function startExplore(zoneKey) {
            const area = document.getElementById('mainArea');
            area.innerHTML = '';

            const anim = document.createElement('div');
            anim.className = 'explore-animation';
            anim.innerHTML = `
                <div class="search-emoji">🔍</div>
                <div style="margin-top:20px; font-size:18px;">正在${ZONES[zoneKey].name}探索中...</div>
            `;
            area.appendChild(anim);

            setTimeout(() => exploreResult(zoneKey), 2000 + Math.random() * 1500);
        }

        function exploreResult(zoneKey) {
            const allTypes = { ...CREATURE_TYPES };
            const weights = { common: 60, rare: 30, legendary: 5 };
            let pool = [];
            Object.entries(allTypes).forEach(([id, t]) => {
                const w = weights[t.rarity] || 10;
                for (let i = 0; i < w; i++) pool.push([id, t]);
            });

            const [foundId, foundType] = pool[Math.floor(Math.random() * pool.length)];

            const area = document.getElementById('mainArea');
            area.innerHTML = '';

            const result = document.createElement('div');
            result.className = 'found-creature';
            const rarityClass = `rarity-${foundType.rarity}`;
            result.innerHTML = `
                <div class="found-emoji">${foundType.emoji}</div>
                <div class="found-name">发现了 ${foundType.name}！</div>
                <div class="found-rarity ${rarityClass}">${getRarityLabel(foundType.rarity)}</div>
                <div style="font-size:14px; color:#aaa; margin-bottom:20px;">${foundType.desc}</div>
                <button class="btn" onclick="catchCreature('${foundId}')">捕捉它！</button>
                <button class="btn" style="background:#555; margin-left:10px;" onclick="switchPage('explore')">放走它</button>
            `;
            area.appendChild(result);
        }

        function catchCreature(typeId) {
            const type = CREATURE_TYPES[typeId];
            const newCreature = {
                id: gameState.nextCreatureId++,
                typeId: typeId,
                name: type.name,
                hunger: 70, happy: 50, growth: 0, level: 1,
            };
            gameState.creatures.push(newCreature);
            if (!gameState.discovered.includes(typeId)) {
                gameState.discovered.push(typeId);
                showNotification(`🎉 首次发现 ${type.name}！`);
            } else {
                showNotification(`✨ 捕捉成功！获得 ${type.name}`);
            }
            gameState.coins += 10;
            addExp(5);
            saveGame();
            updateDisplay();
            switchPage('farm');

            const rect = document.getElementById('mainArea').getBoundingClientRect();
            createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, ['✨', '💫', '🌟', '⭐']);
        }

        // ============ 图鉴 ============
        function renderEncyclopedia(area) {
            const title = document.createElement('div');
            title.style.cssText = 'text-align:center; font-size:22px; color:#e0aaff; margin-bottom:15px; font-weight:bold;';
            title.textContent = '📖 生物图鉴';
            area.appendChild(title);

            const progress = document.createElement('div');
            progress.style.cssText = 'text-align:center; margin:10px 0; color:#81c784;';
            const allIds = Object.keys(CREATURE_TYPES);
            progress.innerHTML = `<span style="font-weight:bold;">${gameState.discovered.length}</span> / ${allIds.length} 种生物已发现`;
            area.appendChild(progress);

            const grid = document.createElement('div');
            grid.className = 'encyclopedia-grid';

            Object.entries(CREATURE_TYPES).forEach(([id, type]) => {
                const unlocked = gameState.discovered.includes(id);
                const entry = document.createElement('div');
                entry.className = `ency-entry ${unlocked ? 'unlocked' : ''}`;
                entry.innerHTML = `
                    <div class="ency-emoji">${unlocked ? type.emoji : '❓'}</div>
                    <div class="ency-name">${unlocked ? type.name : '???'}</div>
                `;
                grid.appendChild(entry);
            });

            area.appendChild(grid);
        }

        // ============ 角色面板 ============
        function openCharacterPanel() {
            renderCharacterPanel();
            document.getElementById('charPanel').classList.add('open');
        }

        function closeCharPanel() {
            document.getElementById('charPanel').classList.remove('open');
        }

        function renderCharacterPanel() {
            const outfit = OUTFITS[gameState.playerOutfit] || OUTFITS.default_male;
            const needed = gameState.playerLevel * 50;

            let outfitsHtml = '';
            Object.entries(OUTFITS).forEach(([key, o]) => {
                if (o.gender !== gameState.playerGender) return;
                const locked = gameState.playerLevel < o.unlockLevel;
                const equipped = gameState.playerOutfit === key;
                outfitsHtml += `
                    <div class="outfit-item ${locked ? 'locked' : ''} ${equipped ? 'equipped' : ''}"
                        ${locked ? '' : `onclick="equipOutfit('${key}')"`}
                        title="${o.name}${locked ? ` (Lv.${o.unlockLevel} 解锁)` : ''}">
                        ${o.emoji}
                        ${locked ? '<span class="lock-icon">🔒</span>' : ''}
                    </div>
                `;
            });

            document.getElementById('charPanelContent').innerHTML = `
                <div style="text-align:center; padding:10px 0;">
                    <div style="font-size:80px;">${outfit.emoji}</div>
                    <div style="font-size:18px; font-weight:bold; margin-top:5px;">${gameState.playerName}</div>
                    <div style="font-size:14px; color:#e0aaff;">Lv.${gameState.playerLevel} ${outfit.name}</div>
                </div>
                <div class="stat-bar" style="margin:15px 0;">
                    <label><span>经验值</span><span>${gameState.exp} / ${needed}</span></label>
                    <div class="bar"><div class="bar-fill bar-growth" style="width:${(gameState.exp / needed) * 100}%"></div></div>
                </div>
                <div style="font-size:13px; color:#aaa; margin-bottom:10px; text-align:center;">
                    完成任务、种植、养殖可获得经验值
                </div>
                <div style="margin-top:15px;">
                    <div style="font-size:14px; font-weight:bold; color:#e0aaff; margin-bottom:10px; text-align:center;">👕 服装仓库</div>
                    <div class="outfit-grid">${outfitsHtml}</div>
                </div>
            `;
        }

        function equipOutfit(key) {
            gameState.playerOutfit = key;
            saveGame();
            renderCharacterPanel();
            updateDisplay();
            showNotification(`👕 换上了 ${OUTFITS[key].name}！`);
        }

        // ============ 面板控制 ============
        function closeSidePanel() {
            document.getElementById('sidePanel').classList.remove('open');
            selectedAnimalId = null;
            selectedPlotIdx = null;
        }

        // ============ 显示更新 ============
        function updateDisplay() {
            const s = SEASONS[gameState.season];
            document.getElementById('seasonDisplay').textContent = `${s.emoji} ${s.name}`;
            document.getElementById('coinsDisplay').textContent = gameState.coins;
            document.getElementById('expDisplay').textContent = gameState.exp;
            document.getElementById('playerLevel').textContent = gameState.playerLevel;
            document.getElementById('playerNameDisplay').textContent = gameState.playerName;

            const outfit = OUTFITS[gameState.playerOutfit] || OUTFITS.default_male;
            document.getElementById('playerAvatarBtn').textContent = outfit.emoji;
        }

        // ============ 季节更新 ============
        function updateSeason() {
            const now = new Date();
            const month = now.getMonth() + 1;
            let season = 'spring';
            if (month >= 6 && month <= 8) season = 'summer';
            else if (month >= 9 && month <= 11) season = 'autumn';
            else if (month === 12 || month <= 2) season = 'winter';

            if (gameState.season !== season) {
                gameState.season = season;
                showNotification(`${SEASONS[season].emoji} 季节变换为${SEASONS[season].name}了！`);
            }
        }

        // ============ 时间衰减 ============
        function tick() {
            if (!gameState.creatures.length) return;
            let changed = false;
            gameState.creatures.forEach(c => {
                c.hunger = Math.max(0, c.hunger - 0.5);
                c.happy = Math.max(0, c.happy - 0.3);
                changed = true;
            });
            if (changed) {
                saveGame();
                updateFarmDisplay();
            }
        }

        // ============ 星空背景 ============
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        // ============ 初始化 ============
        function init() {
            createStars();
            updateSeason();

            if (gameState.firstTime || !gameState.playerGender) {
                renderCharacterSelect();
            } else {
                document.getElementById('topBar').style.display = 'flex';
                document.getElementById('bottomNav').style.display = 'flex';
                updateDisplay();
                switchPage('farm');
            }

            // 定时器
            setInterval(tick, 30000);
            setInterval(updateSeason, 60000);
            setInterval(checkCropGrowth, 1000);
        }

        init();
    </script>
</body>
</html>
